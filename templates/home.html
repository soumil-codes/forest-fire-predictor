<!DOCTYPE html>
<html>
<head>
    <title>Forest Fire Prediction</title>

    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: Arial, Helvetica, sans-serif;
        }

        body {
            min-height: 100vh;
            background: linear-gradient(135deg, #134e4a, #166534);
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 30px;
        }

        .container {
            width: 100%;
            max-width: 600px;
            background: rgba(255,255,255,0.15);
            backdrop-filter: blur(10px);
            border-radius: 20px;
            padding: 40px;
            color: white;
            box-shadow: 0 10px 30px rgba(0,0,0,0.3);
        }

        h1 {
            text-align: center;
            margin-bottom: 10px;
            font-size: 2rem;
        }

        .subtitle {
            text-align: center;
            margin-bottom: 30px;
            color: #e5e7eb;
        }

        .form-group {
            margin-bottom: 18px;
        }

        label {
            display: block;
            margin-bottom: 6px;
            font-weight: bold;
        }

        input {
            width: 100%;
            padding: 12px;
            border-radius: 8px;
            border: none;
            outline: none;
            font-size: 1rem;
        }

        input:focus {
            box-shadow: 0 0 0 3px #86efac;
        }

        .btn {
            width: 100%;
            margin-top: 15px;
            padding: 15px;
            background: #ffffff;
            color: #166534;
            font-size: 1rem;
            font-weight: bold;
            border: none;
            border-radius: 30px;
            cursor: pointer;
            transition: 0.3s;
        }

        .btn:hover {
            transform: translateY(-3px);
            background: #dcfce7;
        }

        .result {
            margin-top: 25px;
            text-align: center;
            font-size: 1.3rem;
            font-weight: bold;
            color: #bbf7d0;
        }

        select{
            padding: 6px 12px;
            font-size: 1rem;
            border-radius: 20px;
        }
    </style>

</head>

<body>

<div class="container">

    <h1>🔥 Forest Fire Prediction</h1>
    <p class="subtitle">
        Enter the environmental parameters to predict the Fire Weather Index (FWI)
    </p>

    <form action="{{ url_for('predict_datapoint') }}" method="POST">

        <div class="form-group">
            <label>Temperature (°C)</label>
            <input type="number" step="any" name="Temperature" placeholder="e.g. 32.5" required>
        </div>

        <div class="form-group">
            <label>Relative Humidity (%)</label>
            <input type="number" step="any" name="RH" placeholder="e.g. 45" required>
        </div>

        <div class="form-group">
            <label>Wind Speed (km/h)</label>
            <input type="number" step="any" name="Ws" placeholder="e.g. 12" required>
        </div>

        <div class="form-group">
            <label>Rain (mm)</label>
            <input type="number" step="any" name="Rain" placeholder="e.g. 0.5" required>
        </div>

        <div class="form-group">
            <label>FFMC</label>
            <input type="number" step="any" name="FFMC" placeholder="e.g. 85.2" required>
        </div>

        <div class="form-group">
            <label>DMC</label>
            <input type="number" step="any" name="DMC" placeholder="e.g. 26.7" required>
        </div>

        <div class="form-group">
            <label>ISI</label>
            <input type="number" step="any" name="ISI" placeholder="e.g. 5.8" required>
        </div>

        <div class="form-group">
            <label>Classes</label>
            <select name="Classes" required>
                <option value="">Select class</option>
                <option value="0">Not Fire</option>
                <option value="1">Fire</option>
            </select>
        </div>

        <div class="form-group">
            <label>Region</label>
            <select name="Region" required>
                <option value="">Select region</option>
                <option value="0">Bejaia</option>
                <option value="1">Sidi-Bel Abbes</option>
            </select>
        </div>

        <button type="submit" class="btn">
            Predict FWI
        </button>

    </form>

    <div class="result">
        Predicted FWI: {{ results }}
    </div>

</div>

</body>
</html>
